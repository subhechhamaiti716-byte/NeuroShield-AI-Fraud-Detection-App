version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: neuroshield
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuroshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://neuroshield:password@postgres:5432/neuroshield_db
      - REDIS_URL=redis://redis:6379/0

volumes:
  postgres_data:
